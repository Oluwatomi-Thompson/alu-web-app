<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Explorer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/54db14f8b5.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="..." crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="heading">
            <i class="fa-solid fa-globe"></i>
            <h1>Country Explorer</h1>
            <p>Discover data on every country in the world</p>
        </div>

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search countries...">
        </div>

        <div class="controls">
        <select id="regionFilter">
            <option value="all">All Regions</option>
            <option value="Africa">Africa</option>
            <option value="Europe">Europe</option>
            <option value="Asia">Asia</option>
            <option value="Americas">Americas</option>
            <option value="Oceania">Oceania</option>
        </select>

        <select id="sortPopulation">
            <option value="default">Sort by Population</option>
            <option value="asc">Low → High</option>
            <option value="desc">High → Low</option>
        </select>
    </div>

        <div class="countries">

        </div>

    
    </div>

    <script src="script.js"></script>
</body>
</html>
